<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#EDEDED">
    <title>403: Not This Round</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #EDEDED;
            color: #212529;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            max-width: 450px;
            padding: 20px;
            width: 100%;
        }

        .brand-header {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 800;
            text-transform: lowercase;
            letter-spacing: -1.5px;
            font-size: 5rem;
            margin-bottom: 0px;
            line-height: 1;
        }

        .subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #6c757d;
            margin-bottom: 40px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .error-description {
                font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            color: #495057;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .footer-note {
                font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="brand-header">403</div>
    <div class="subtitle">Not This Round</div>

    <p class="error-description">
      <strong>Whoa there!</strong> <br>
        You tried to rush the frat this semester, but the brothers have made their call. <br> Looks like you didn’t make the cut this round.
    </p>
    <p class="footer-note">Don’t sweat it, bud — keep your head up and hit the next party!</p>
</div>

</body>
</html>
