<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E2E2E2">
    <title>404: Vibe Not Found</title>

    <style>
        body {
            background-color: #E2E2E2;
            color: #212529;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            max-width: 450px;
            padding: 20px;
            width: 100%;
            margin: 0 auto;
        }

        .text-center {
            text-align: center;
        }

        .brand-header {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 800;
            text-transform: lowercase;
            letter-spacing: -1.5px;
            font-size: 5rem;
            margin-bottom: 0px;
            line-height: 1;
        }

        .subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #6c757d;
            margin-bottom: 40px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .error-description {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            color: #495057;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .footer-note {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            opacity: 0.6;
        }
        .btn-home {
            font-family: 'Courier New', Courier, monospace;
            text-decoration: none;
            color: #212529;
            border: 2px solid #212529;
            padding: 10px 20px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-home:hover {
            background-color: #212529;
            color: #E2E2E2;
        }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="brand-header">404</div>
    <div class="subtitle">Vibe Not Found</div>

    <p class="error-description">
      <strong>Oop, sorry there, bud.</strong> <br>
        Looks like you took a wrong turn at the rink. <br>This page is ghosting us harder than a 2-goal lead in the third.
    </p>


    <p class="footer-note">Keep your stick on the ice.</p>
</div>

</body>
</html>
