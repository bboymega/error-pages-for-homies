<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#EDEDED">
    <title>404: Lost, Bro?</title>

    <style>
        body {
            background-color: #EDEDED;
            color: #212529;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            max-width: 450px;
            padding: 20px;
            width: 100%;
            margin: 0 auto;
        }

        .text-center {
            text-align: center;
        }
        
        .brand-header {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 800;
            text-transform: lowercase;
            letter-spacing: -1.5px;
            font-size: 5rem;
            margin-bottom: 0px;
            line-height: 1;
        }

        .subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #6c757d;
            margin-bottom: 40px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .error-description {
                font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            color: #495057;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .footer-note {
                font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="brand-header">404</div>
    <div class="subtitle">Lost, Bro?</div>

    <p class="error-description">
      <strong>Whoa there!</strong> <br>
      Looks like you took a wrong turn. <br>
      This page doesn’t exist… maybe the keg ran dry?
    </p>
    <p class="footer-note">No worries, bud. Just head back and keep the party rolling!</p>
</div>

</body>
</html>
